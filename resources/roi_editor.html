<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Reco - Field ROI Editor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a1a; color: #ddd; font-family: system-ui, sans-serif; }
.header { padding: 12px 20px; background: #222; display: flex; align-items: center; gap: 16px; }
.header h1 { font-size: 16px; font-weight: 600; }
.header select, .header button { padding: 6px 12px; border-radius: 4px; border: 1px solid #444; background: #333; color: #ddd; font-size: 13px; cursor: pointer; }
.header button.primary { background: #4a7a4a; border-color: #5a9a5a; }
.header button:hover { background: #444; }
.header button.primary:hover { background: #5a8a5a; }
.header .spacer { flex: 1; }
.header .info { color: #888; font-size: 12px; }
.canvas-wrap { position: relative; display: flex; justify-content: center; padding: 5px; overflow: hidden; height: calc(100vh - 55px); }
canvas { cursor: crosshair; max-width: 100%; max-height: 100%; object-fit: contain; }
.instructions { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); background: #333a; padding: 6px 14px; border-radius: 6px; font-size: 11px; color: #aaa; pointer-events: none; }
</style>
</head>
<body>

<div class="header">
  <h1>Field ROI Editor</h1>
  <select id="side">
    <option value="left">Left Camera</option>
    <option value="right">Right Camera</option>
  </select>
  <button onclick="undo()">Undo</button>
  <button onclick="clearPoints()">Clear</button>
  <span class="spacer"></span>
  <span class="info" id="pointCount">0 points</span>
  <button class="primary" onclick="saveAndClose()">Save ROI</button>
</div>

<div class="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<div class="instructions">
  Click to add field boundary points. Right-click to undo. Switch cameras above. Save writes to calibration file and copies to clipboard.
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const sideSelect = document.getElementById('side');
const pointCountEl = document.getElementById('pointCount');

const roi = { left: [], right: [] };
const images = { left: null, right: null };
let currentImage = null;

// Data injected by Rust at generation time (base64 data URIs + inline JSON).
// These placeholders are replaced with actual values in the generated HTML.
const LEFT_IMAGE_DATA = '{{LEFT_IMAGE_DATA}}';
const RIGHT_IMAGE_DATA = '{{RIGHT_IMAGE_DATA}}';
const CAL_JSON = {{CAL_JSON}};
const CAL_PATH = '{{CAL_PATH}}';

function loadImage(dataUri) {
  return new Promise((resolve, reject) => {
    if (!dataUri || dataUri.startsWith('{{')) { reject('no data'); return; }
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = dataUri;
  });
}

async function init() {
  try { images.left = await loadImage(LEFT_IMAGE_DATA); } catch(e) { console.warn('Left image not available'); }
  try { images.right = await loadImage(RIGHT_IMAGE_DATA); } catch(e) { console.warn('Right image not available'); }

  if (CAL_JSON && CAL_JSON.field_roi) {
    if (CAL_JSON.field_roi.left) roi.left = CAL_JSON.field_roi.left.map(p => [...p]);
    if (CAL_JSON.field_roi.right) roi.right = CAL_JSON.field_roi.right.map(p => [...p]);
  }

  switchSide();
}

function switchSide() {
  const side = sideSelect.value;
  currentImage = images[side];
  if (currentImage) {
    canvas.width = currentImage.naturalWidth;
    canvas.height = currentImage.naturalHeight;
  } else {
    canvas.width = 1920;
    canvas.height = 1080;
  }
  redraw();
}

sideSelect.addEventListener('change', switchSide);

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (currentImage) {
    ctx.drawImage(currentImage, 0, 0);
  } else {
    ctx.fillStyle = '#333';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#888';
    ctx.font = '20px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('No image loaded - ffmpeg may not be installed', canvas.width/2, canvas.height/2);
  }

  const side = sideSelect.value;
  const points = roi[side];
  const w = canvas.width;
  const h = canvas.height;

  if (points.length > 0) {
    ctx.beginPath();
    ctx.moveTo(points[0][0] * w, points[0][1] * h);
    for (let i = 1; i < points.length; i++) {
      ctx.lineTo(points[i][0] * w, points[i][1] * h);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(0, 255, 0, 0.1)';
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(points[0][0] * w, points[0][1] * h);
    for (let i = 1; i < points.length; i++) {
      ctx.lineTo(points[i][0] * w, points[i][1] * h);
    }
    ctx.closePath();
    ctx.strokeStyle = '#0f0';
    ctx.lineWidth = 2;
    ctx.stroke();

    for (let i = 0; i < points.length; i++) {
      const x = points[i][0] * w;
      const y = points[i][1] * h;
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#0f0';
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = '11px system-ui';
      ctx.fillText(String(i + 1), x + 8, y - 6);
    }
  }

  pointCountEl.textContent = `${points.length} points (${side})`;
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX / canvas.width;
  const y = (e.clientY - rect.top) * scaleY / canvas.height;
  roi[sideSelect.value].push([Math.round(x * 10000) / 10000, Math.round(y * 10000) / 10000]);
  redraw();
});

canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  undo();
});

function undo() {
  roi[sideSelect.value].pop();
  redraw();
}

function clearPoints() {
  roi[sideSelect.value] = [];
  redraw();
}

function saveAndClose() {
  const roiData = { left: roi.left, right: roi.right };
  const json = JSON.stringify(roiData, null, 2);

  navigator.clipboard.writeText(json).then(() => {
    pointCountEl.textContent = 'ROI copied to clipboard! Go back to Reco and click "Paste ROI".';
    pointCountEl.style.color = '#8f8';
    document.querySelector('.instructions').textContent = 'Done! Switch back to Reco and click "Paste ROI" to apply.';
  }).catch(() => {
    // Fallback: show the JSON for manual copy
    prompt('Copy this ROI JSON, then paste in Reco with "Paste ROI":', json);
  });
}

init();
</script>
</body>
</html>
