name: Build Test Binary

on:
  workflow_dispatch:
  push:
    branches: [fix/v0.5.0-release-prep]

permissions:
  contents: read

concurrency:
  group: build-test-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Windows CLI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install FFmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2026-05-12-13-59/ffmpeg-n7.1.4-win64-gpl-shared-7.1.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\ffmpeg.zip" -DestinationPath "$env:RUNNER_TEMP\ffmpeg"
          $dir = (Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Directory | Select-Object -First 1).FullName
          echo "FFMPEG_DIR=$dir" >> $env:GITHUB_ENV
          echo "FFMPEG_DLL_DIR=$dir\bin" >> $env:GITHUB_ENV

      - name: Build CLI
        run: cargo build --release -p reco-cli --features load-dynamic

      - name: Upload binary + FFmpeg DLLs
        uses: actions/upload-artifact@v4
        with:
          name: reco-cli-windows-test
          path: |
            target/release/reco.exe
            ${{ env.FFMPEG_DLL_DIR }}/*.dll
