name: Build Test Binary

on:
  workflow_dispatch:
  push:
    branches: [fix/v0.5.0-release-prep]

permissions:
  contents: read

concurrency:
  group: build-test-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Windows CLI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: C:\ffmpeg
          key: ffmpeg-n7.1.4-win64-gpl-shared

      - name: Install FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2026-05-12-13-59/ffmpeg-n7.1.4-win64-gpl-shared-7.1.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\ffmpeg.zip" -DestinationPath C:\ffmpeg

      - name: Set FFmpeg env
        shell: pwsh
        run: |
          $dir = (Get-ChildItem "C:\ffmpeg" -Directory | Select-Object -First 1).FullName
          echo "FFMPEG_DIR=$dir" >> $env:GITHUB_ENV
          echo "FFMPEG_DLL_DIR=$dir\bin" >> $env:GITHUB_ENV

      - name: Build CLI
        run: cargo build --release -p reco-cli --features load-dynamic

      - name: Bundle binary + DLLs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact
          Copy-Item target/release/reco.exe artifact/
          Copy-Item "$env:FFMPEG_DLL_DIR\*.dll" artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reco-cli-windows-test
          path: artifact/
