name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # linux-arm64 cross-compile is fragile (target install + cross deps).
        # fail-fast: false ensures other platforms still build if it fails.
        include:
          - name: linux-x86_64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: reco

          - name: linux-arm64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: reco
            cross: true

          - name: macos-arm64
            target: aarch64-apple-darwin
            os: macos-latest
            binary: reco

          - name: macos-x86_64
            target: x86_64-apple-darwin
            os: macos-15-intel
            binary: reco

          - name: windows-x86_64
            target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: reco.exe

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-${{ matrix.target }}

      # ----------------------------------------------------------------
      # Linux x86_64 (native) dependencies
      # ----------------------------------------------------------------
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux' && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libavdevice-dev libavfilter-dev libswresample-dev \
            pkg-config clang \
            libfontconfig1-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev

      # ----------------------------------------------------------------
      # Linux ARM64 cross-compilation
      #
      # Sets up multiarch apt sources so we can install arm64 FFmpeg dev
      # packages alongside the amd64 host packages. The approach:
      #   1. Restrict existing sources to amd64 (prevent 404s on ports)
      #   2. Add arm64 sources from ports.ubuntu.com
      #   3. Install the aarch64 cross-toolchain + arm64 FFmpeg libraries
      #
      # KNOWN LIMITATION: The sed command that patches ubuntu.sources
      # assumes DEB822 format (Ubuntu 24.04+). If the runner image
      # changes format, apt-get update may show 404 warnings for arm64
      # from archive.ubuntu.com -- these are harmless but noisy.
      # If they become errors, replace the sed with a full sources
      # rewrite (see comments in-line).
      # ----------------------------------------------------------------
      - name: Set up ARM64 cross-compilation
        if: matrix.cross
        run: |
          sudo dpkg --add-architecture arm64
          codename=$(. /etc/os-release && echo "$VERSION_CODENAME")

          # Restrict existing sources to amd64 to prevent apt from
          # looking for arm64 packages on archive.ubuntu.com (404).
          # Targets DEB822 stanzas by inserting Architectures before Suites.
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i 's/^Suites:/Architectures: amd64\nSuites:/' \
              /etc/apt/sources.list.d/ubuntu.sources
          fi

          # arm64 packages live on ports.ubuntu.com, not archive.ubuntu.com
          cat <<SOURCES | sudo tee /etc/apt/sources.list.d/arm64-cross.sources
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports/
          Suites: ${codename} ${codename}-updates ${codename}-security
          Components: main universe
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          SOURCES

          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            pkg-config clang \
            libavcodec-dev:arm64 libavformat-dev:arm64 libavutil-dev:arm64 \
            libswscale-dev:arm64 libavdevice-dev:arm64 libavfilter-dev:arm64 \
            libswresample-dev:arm64

          # Tell cargo & pkg-config how to cross-compile
          {
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc"
            echo "PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig"
            echo "PKG_CONFIG_ALLOW_CROSS=1"
            echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc"
            echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++"
          } >> "$GITHUB_ENV"

      # ----------------------------------------------------------------
      # macOS dependencies (works for both ARM64 and Intel runners)
      # ----------------------------------------------------------------
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg pkg-config

      # ----------------------------------------------------------------
      # Windows dependencies
      #
      # Downloads pre-built FFmpeg shared libraries from BtbN/FFmpeg-Builds.
      # The "latest" tag always points to the most recent nightly build.
      # For reproducible releases, pin to a specific BtbN release tag.
      #
      # KNOWN LIMITATION: No Windows ARM64 release build. There are no
      # widely available FFmpeg development libraries for aarch64-pc-windows-msvc.
      # The CI workflow runs cargo check for Windows ARM64 (reco-core only).
      # ----------------------------------------------------------------
      # Pinned to a specific BtbN autobuild snapshot + the n7.1 stable
      # branch (not master/nightly) so Windows release binaries are
      # reproducible across builds. n7.1 is ABI-compatible with
      # ffmpeg-next 8.x. When bumping: check
      # https://github.com/BtbN/FFmpeg-Builds/releases for a newer
      # autobuild tag and update both the TAG and the version-specific
      # filename together.
      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Resolve the newest BtbN autobuild carrying an n7.1
          # win64-gpl-shared zip; a hard-pinned tag 404s once BtbN GCs it.
          $headers = @{ 'User-Agent' = 'reco-ci'; 'Authorization' = "Bearer $env:GH_TOKEN" }
          $releases = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/BtbN/FFmpeg-Builds/releases?per_page=15"
          $asset = $null
          foreach ($r in $releases) {
            $asset = $r.assets | Where-Object { $_.name -like "*n7.1*win64-gpl-shared*.zip" } | Select-Object -First 1
            if ($asset) { break }
          }
          if (-not $asset) { throw "No n7.1 win64-gpl-shared FFmpeg asset found in recent BtbN autobuilds" }
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\ffmpeg.zip" -DestinationPath "$env:RUNNER_TEMP\ffmpeg"
          $dir = (Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Directory | Select-Object -First 1).FullName
          echo "FFMPEG_DIR=$dir" >> $env:GITHUB_ENV
          echo "FFMPEG_DLL_DIR=$dir\bin" >> $env:GITHUB_ENV
          echo "Bundled FFmpeg: $($asset.name)"

      # ----------------------------------------------------------------
      # Build
      # ----------------------------------------------------------------
      - name: Build release binaries
        run: |
          cargo build --release --target ${{ matrix.target }} -p reco-cli --features load-dynamic
          cargo build --release --target ${{ matrix.target }} -p reco-gui --features load-dynamic || echo "::warning::reco-gui build failed on ${{ matrix.name }} (cross-compile or missing deps)"

      # ----------------------------------------------------------------
      # ONNX Runtime (bundled for AI detection)
      # ----------------------------------------------------------------
      - name: Download ONNX Runtime (Windows - DirectML)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nupkg = "$env:RUNNER_TEMP\ort-dml.nupkg"
          Invoke-WebRequest -Uri "https://api.nuget.org/v3-flatcontainer/microsoft.ml.onnxruntime.directml/1.24.4/microsoft.ml.onnxruntime.directml.1.24.4.nupkg" -OutFile $nupkg
          Expand-Archive -Path $nupkg -DestinationPath "$env:RUNNER_TEMP\ort-dml"
          $dll = "$env:RUNNER_TEMP\ort-dml\runtimes\win-x64\native\onnxruntime.dll"
          echo "ORT_DLL=$dll" >> $env:GITHUB_ENV
          echo "Bundled ONNX Runtime 1.24.4 DirectML ($('{0:N1}' -f ((Get-Item $dll).Length / 1MB)) MB)"

          # DirectML.dll is in a separate NuGet package (not bundled in ORT DirectML).
          $dmlPkg = "$env:RUNNER_TEMP\directml.nupkg"
          Invoke-WebRequest -Uri "https://api.nuget.org/v3-flatcontainer/microsoft.ai.directml/1.15.4/microsoft.ai.directml.1.15.4.nupkg" -OutFile $dmlPkg
          Expand-Archive -Path $dmlPkg -DestinationPath "$env:RUNNER_TEMP\directml"
          $dml = "$env:RUNNER_TEMP\directml\bin\x64-win\DirectML.dll"
          echo "DML_DLL=$dml" >> $env:GITHUB_ENV
          echo "Bundled DirectML.dll 1.15.4 ($('{0:N1}' -f ((Get-Item $dml).Length / 1MB)) MB)"

      - name: Download ONNX Runtime (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -sL "https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-osx-${{ matrix.target == 'aarch64-apple-darwin' && 'arm64' || 'x86_64' }}-1.24.4.tgz" -o /tmp/ort.tgz
          tar xzf /tmp/ort.tgz -C /tmp
          ORT_LIB=$(find /tmp/onnxruntime-* -name "libonnxruntime*.dylib" | head -1)
          echo "ORT_LIB=$ORT_LIB" >> "$GITHUB_ENV"
          echo "Bundled ONNX Runtime 1.24.4 ($(du -h "$ORT_LIB" | cut -f1))"

      - name: Download ONNX Runtime (Linux)
        if: runner.os == 'Linux' && !matrix.cross
        run: |
          curl -sL "https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-linux-x64-1.24.4.tgz" -o /tmp/ort.tgz
          tar xzf /tmp/ort.tgz -C /tmp
          ORT_LIB=$(find /tmp/onnxruntime-* -name "libonnxruntime.so*" -not -type l | head -1)
          echo "ORT_LIB=$ORT_LIB" >> "$GITHUB_ENV"
          echo "Bundled ONNX Runtime 1.24.4 CPU ($(du -h "$ORT_LIB" | cut -f1))"

      # ----------------------------------------------------------------
      # Package
      # ----------------------------------------------------------------
      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          staging="reco-cli-${{ github.ref_name }}-${{ matrix.name }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$staging/"
          cp LICENSE "$staging/"
          tar czf "$staging.tar.gz" "$staging"

      - name: Package GUI (Unix)
        if: runner.os != 'Windows'
        run: |
          gui_bin="target/${{ matrix.target }}/release/reco-gui"
          if [ -f "$gui_bin" ]; then
            staging="reco-gui-${{ github.ref_name }}-${{ matrix.name }}"
            mkdir "$staging"
            cp "$gui_bin" "$staging/"
            # Bundle ONNX Runtime for AI detection
            if [ -n "$ORT_LIB" ] && [ -f "$ORT_LIB" ]; then
              cp "$ORT_LIB" "$staging/"
            fi
            cp LICENSE "$staging/"
            tar czf "$staging.tar.gz" "$staging"
          fi

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = "reco-cli-${{ github.ref_name }}-${{ matrix.name }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" "$staging\"
          Copy-Item LICENSE "$staging\"
          if (Test-Path "$env:FFMPEG_DLL_DIR") {
            Copy-Item "$env:FFMPEG_DLL_DIR\*.dll" "$staging\"
          }
          if (Test-Path "$env:ORT_DLL") {
            Copy-Item "$env:ORT_DLL" "$staging\"
          }
          if (Test-Path "$env:DML_DLL") {
            Copy-Item "$env:DML_DLL" "$staging\"
          }
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"

      - name: Package GUI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $guiBin = "target\${{ matrix.target }}\release\reco-gui.exe"
          if (Test-Path $guiBin) {
            $staging = "reco-gui-${{ github.ref_name }}-${{ matrix.name }}"
            New-Item -ItemType Directory -Path $staging | Out-Null
            Copy-Item $guiBin "$staging\"
            Copy-Item LICENSE "$staging\"
            if (Test-Path "$env:FFMPEG_DLL_DIR") {
              Copy-Item "$env:FFMPEG_DLL_DIR\*.dll" "$staging\"
            }
            # Bundle ONNX Runtime + DirectML for AI detection
            if (Test-Path "$env:ORT_DLL") {
              Copy-Item "$env:ORT_DLL" "$staging\"
            }
            if (Test-Path "$env:DML_DLL") {
              Copy-Item "$env:DML_DLL" "$staging\"
            }
            Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reco-${{ matrix.name }}
          path: reco-*-${{ github.ref_name }}-${{ matrix.name }}.*
          if-no-files-found: error

  # ====================================================================
  # Create the GitHub Release and attach all platform binaries
  # ====================================================================
  release:
    name: Create Release
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum reco-* > SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prerelease_flag=""
          if echo "${{ github.ref_name }}" | grep -qE "(alpha|beta|rc)"; then
            prerelease_flag="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --draft \
            $prerelease_flag \
            artifacts/*
