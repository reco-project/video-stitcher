name: Rust CI

on:
  push:
    branches: [v2]
  pull_request:
    branches: [v2]

env:
  CARGO_TERM_COLOR: always
  APT_PACKAGES: >-
    libavcodec-dev libavformat-dev libavutil-dev
    libswscale-dev libavdevice-dev libavfilter-dev libswresample-dev
    libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
    pkg-config clang

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: ${{ env.APT_PACKAGES }}
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Clippy (with profiling)
        run: cargo clippy --all-targets --features profiling -- -D warnings
      - name: Clippy (with gstreamer)
        run: cargo clippy --all-targets --features gstreamer -- -D warnings
      - name: Clippy (with load-dynamic)
        run: cargo clippy --all-targets --features load-dynamic -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: ${{ env.APT_PACKAGES }}
      - name: Run tests
        run: cargo test --all
      - name: Run tests (with profiling)
        run: cargo test --all --features profiling

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: ${{ env.APT_PACKAGES }}
      - name: Build docs
        # Exclude `rpi` feature: requires patched FFmpeg with SAND pixel formats
        # that aren't available in Ubuntu's standard libavcodec.
        run: cargo doc --no-deps --features profiling,gstreamer
        env:
          RUSTDOCFLAGS: "-D warnings"

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  msrv:
    name: MSRV (1.85.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: ${{ env.APT_PACKAGES }}
      - name: Check MSRV
        run: cargo check --all

  check-macos:
    name: Check (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: brew install ffmpeg gstreamer gst-plugins-base pkg-config
      - name: Check reco-core
        run: cargo check -p reco-core
      - name: Check reco-core (profiling)
        run: cargo check -p reco-core --features profiling

  check-windows:
    name: Check (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check reco-core
        run: cargo check -p reco-core
      - name: Check reco-core (profiling)
        run: cargo check -p reco-core --features profiling

  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
