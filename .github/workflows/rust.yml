name: Rust CI

on:
  push:
    branches: [v2, main, v2-consolidation]
  pull_request:
    branches: [v2, main]

# Restrict default permissions to read-only. Jobs that need more
# declare their own permissions block.
permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR to save resources.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Includes libobs-dev because reco-obs's build.rs runs bindgen
  # against /usr/include/obs/obs.h on every workspace-level cargo
  # command (clippy, test, doc, bench). Without it, any job that
  # touches reco-obs fails at build-script time.
  APT_PACKAGES: >-
    libavcodec-dev libavformat-dev libavutil-dev
    libswscale-dev libavdevice-dev libavfilter-dev libswresample-dev
    libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
    libfontconfig1-dev libobs-dev
    pkg-config clang

jobs:
  # ===========================================================================
  # check & lint — the tight-loop gate. Runs on every push.
  # ===========================================================================
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: ${{ env.APT_PACKAGES }}
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Clippy (with profiling)
        run: cargo clippy --workspace --all-targets --features profiling -- -D warnings
      - name: Clippy (with gstreamer)
        run: cargo clippy --workspace --all-targets --features gstreamer -- -D warnings
      - name: Clippy (with load-dynamic)
        run: cargo clippy --workspace --all-targets --features load-dynamic -- -D warnings
      - name: Clippy (reco-gui automation hook)
        run: cargo clippy -p reco-gui --all-targets --features automation -- -D warnings
      - name: Clippy (no default features)
        run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings

  # ===========================================================================
  # test — default features + profiling + all-features.
  # ===========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: ${{ env.APT_PACKAGES }}
      - name: Run tests (default)
        run: cargo test --workspace
      - name: Run tests (with profiling)
        run: cargo test --workspace --features profiling

  # ===========================================================================
  # doc — full workspace docs, all features enabled, warnings-as-errors.
  # ===========================================================================
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: ${{ env.APT_PACKAGES }}
      - name: Build docs (profiling + gstreamer + load-dynamic + stacked-output + reco-control transports)
        run: cargo doc --workspace --no-deps --features profiling,gstreamer,load-dynamic,stacked-output,keyboard,gopro
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ===========================================================================
  # deny — cargo-deny supply-chain + licenses + bans check.
  # ===========================================================================
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check
          arguments: --all-features

  # ===========================================================================
  # audit — RUSTSEC advisory check. Kept alongside cargo-deny because
  # rustsec/audit-check annotates PRs nicely with flagged advisories.
  # ===========================================================================
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # msrv — the Rust toolchain we officially support.
  # ===========================================================================
  msrv:
    # Bumped from 1.88 to 1.92 because wgpu 28 declares rust-version=1.92
    # in its Cargo.toml. Enforced via rust-toolchain.toml + this job.
    name: MSRV (1.92.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@1.92.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: ${{ env.APT_PACKAGES }}
      - name: Check MSRV
        run: cargo check --workspace

  # ===========================================================================
  # GPU execution provider compile-check jobs.
  #
  # deep-review-2026-04-18 Agent 4 F1 (Critical): CI never builds any of
  # `cuda / tensorrt / coreml / ncnn / tensorrt-native`, leaving their
  # Rust + build.rs code with zero compile signal. This block closes
  # that gap with compile-only jobs (no test-run, no GPU hardware).
  #
  # - CUDA / TensorRT / CoreML are exercised via `--features XYZ,load-dynamic`
  #   which keeps ORT from linking at build time, so the host doesn't
  #   need the runtime SDKs installed.
  # - tensorrt-native is a C++ wrapper that requires NvInfer.h. No GH
  #   runner has it, so the job is best-effort (`continue-on-error`).
  #   Any actual C++ compile errors still appear in the log for humans.
  # ===========================================================================
  gpu-backends:
    name: GPU backend compile-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: ${{ env.APT_PACKAGES }}
      - name: Check reco-detect (cuda + load-dynamic)
        run: cargo check -p reco-detect --features cuda,load-dynamic
      - name: Check reco-detect (tensorrt + load-dynamic)
        run: cargo check -p reco-detect --features tensorrt,load-dynamic
      - name: Check reco-detect (ncnn)
        run: cargo check -p reco-detect --features ncnn
      - name: Check reco-detect (tensorrt-native, best-effort)
        # Requires NvInfer.h which no hosted GH runner has. Kept in CI
        # to catch Rust-side regressions in trt/engine.rs even when the
        # C++ compile fails upstream.
        run: cargo check -p reco-detect --features tensorrt-native
        continue-on-error: true

  # ===========================================================================
  # Benchmark compile — catches bench regressions during the long v2
  # consolidation branch. Compile-only; no runtime measurement.
  # ===========================================================================
  bench-build:
    name: Benchmark compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: ${{ env.APT_PACKAGES }}
      - name: Build benches (no-run)
        run: cargo bench --workspace --no-run

  # ===========================================================================
  # macOS — covers reco-core + CLI; extended to reco-gui and the ORT
  # CoreML backend (compile-only). reco-obs requires libobs headers that
  # are not shipped via Homebrew, so it is skipped here.
  # ===========================================================================
  check-macos:
    name: Check (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install dependencies
        run: brew install ffmpeg gstreamer gst-plugins-base pkg-config
      - name: Check reco-core
        run: cargo check -p reco-core
      - name: Check reco-core (profiling)
        run: cargo check -p reco-core --features profiling
      - name: Check full CLI
        run: cargo check -p reco-cli
      - name: Check reco-gui (macOS Metal path)
        run: cargo check -p reco-gui
      - name: Check reco-detect (coreml + load-dynamic)
        run: cargo check -p reco-detect --features coreml,load-dynamic

  # macOS Intel (x86_64-apple-darwin) is suspended - the ort-sys crate
  # publishes no prebuilt ONNX Runtime binary for that target with
  # reco-detect's feature set, and we have no hardware to test on.

  # ===========================================================================
  # Windows — covers reco-core + reco-gui. reco-obs requires libobs
  # headers from vcpkg; deferred to a future CI expansion.
  # ===========================================================================
  check-windows:
    name: Check (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Check reco-core
        run: cargo check -p reco-core
      - name: Check reco-core (profiling)
        run: cargo check -p reco-core --features profiling
      # reco-gui transitively depends on ffmpeg-sys-next via reco-io,
      # which fails to build on windows-latest without vcpkg FFmpeg
      # provisioning. Deferred to M8 once we wire vcpkg in a way that
      # doesn't blow per-push CI time budget.

  # Cross-compile check: cargo check type-checks without linking, so no
  # FFmpeg or ORT native libraries are needed for the target architecture.
  # Pins the toolchain to 1.92.0 to match rust-toolchain.toml - otherwise
  # @stable installs latest stable but rust-toolchain.toml forces 1.92.0
  # on first cargo invocation, and the target's std lib is not installed
  # for 1.92.0. Pinning resolves "can't find crate for `core`" errors.
  check-windows-arm:
    name: Check (Windows ARM64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          targets: aarch64-pc-windows-msvc
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Check reco-core
        run: cargo check -p reco-core --target aarch64-pc-windows-msvc
      - name: Check reco-core (profiling)
        run: cargo check -p reco-core --target aarch64-pc-windows-msvc --features profiling

  # Cross-compile check: verifies reco-core compiles for aarch64 Linux (Jetson).
  # Full CLI check is skipped because ffmpeg-sys-next's build script requires
  # FFmpeg dev packages for the target architecture (multiarch apt setup).
  check-linux-arm:
    name: Check (Linux ARM64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Check reco-core
        run: cargo check -p reco-core --target aarch64-unknown-linux-gnu
      - name: Check reco-core (profiling)
        run: cargo check -p reco-core --target aarch64-unknown-linux-gnu --features profiling

  # ===========================================================================
  # Android compile-check — keeps the mobile trait design honest during
  # the M3 refactor. User directive 2026-04-18: Android is a real
  # hardware target, not just a trait-ready future. A real-device test
  # via adb shell comes later in M5/M7.
  # ===========================================================================
  check-android:
    name: Check (Android aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # Pinned toolchain for same reason as check-linux-arm /
      # check-windows-arm: rust-toolchain.toml forces 1.92.0, and
      # `rustup target add` applies to the active toolchain.
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Check reco-core (Android, no default features)
        # reco-core has no std::fs / FFmpeg deps by itself; should
        # compile clean for the Android target. Failures here flag
        # inadvertent host-OS assumptions creeping in.
        run: cargo check -p reco-core --target aarch64-linux-android --no-default-features

  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # Run the gitleaks CLI directly instead of gitleaks-action. The action
      # requires a license key for org repos, and that secret is unavailable
      # to pull_request runs from forks, so it failed on every community PR.
      # The binary is free for everyone and needs no secret, so it scans fork
      # and internal PRs identically.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C "$HOME/.local/bin" gitleaks
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Scan working tree for secrets
        run: gitleaks dir . --redact --verbose
