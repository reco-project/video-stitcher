[package]
name = "reco-autocam"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Automatic camera control for reco: YOLO ball detector, EKF tracker, ball-tracking director"

[dependencies]
reco-core = { path = "../reco-core" }
ort = "2.0.0-rc.12"
log = "0.4"

[features]
cuda = ["ort/cuda"]
tensorrt = ["ort/tensorrt"]
coreml = ["ort/coreml"]
profiling = ["reco-core/profiling", "dep:tracing"]

[dependencies.tracing]
workspace = true
optional = true
