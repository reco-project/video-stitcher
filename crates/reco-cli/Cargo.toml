[package]
name = "reco-cli"
version = "0.1.0"
edition = "2024"
description = "CLI tool for Reco panoramic video stitching"
license = "AGPL-3.0-only"
repository = "https://github.com/reco-project/video-stitcher"

[[bin]]
name = "reco"
path = "src/main.rs"

[dependencies]
reco-core = { path = "../reco-core" }
reco-ffmpeg = { path = "../reco-ffmpeg" }
clap = { version = "4", features = ["derive"] }
env_logger = "0.11"
log = "0.4"
anyhow = "1"
serde_json = "1"
pollster = "0.4"
