[package]
name = "reco-core"
version = "0.1.0"
edition = "2024"
description = "GPU-accelerated panoramic video stitching engine"
license = "AGPL-3.0-only"
repository = "https://github.com/reco-project/video-stitcher"
readme = "README.md"

[dependencies]
wgpu = "25"
bytemuck = { version = "1", features = ["derive"] }
nalgebra = "0.33"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
log = "0.4"
pollster = "0.4"

[dev-dependencies]
approx = "0.5"
env_logger = "0.11"
